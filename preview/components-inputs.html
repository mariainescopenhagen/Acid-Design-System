<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Acid — Inputs</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/fontsource/fonts/dela-gothic-one@latest/latin-400-normal.css" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/fontsource/fonts/space-grotesk@latest/latin-400-normal.css" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/fontsource/fonts/fira-code@latest/latin-400-normal.css" />
<style>
  body { padding: calc(var(--acid-grid) * 12) var(--acid-margin); background-color: var(--acid-bg); color: var(--acid-text); font-family: var(--acid-f-body); }
  .page-head { border-bottom: 2px solid var(--acid-text); padding-bottom: calc(var(--acid-grid) * 4); margin-bottom: calc(var(--acid-grid) * 8); }
  .page-head .eyebrow { font-family: var(--acid-f-mono); font-size: var(--acid-s-sm); color: var(--acid-brand-secondary); margin-bottom: calc(var(--acid-grid) * 2); text-transform: uppercase; letter-spacing: 0.1em; }
  .page-head h1 { font-family: var(--acid-f-heading); font-size: var(--acid-s-lg); font-weight: 600; letter-spacing: -0.02em; margin: 0; }
  .showcase { background: var(--acid-surface); border: 1px solid var(--acid-border); border-radius: var(--acid-radius); padding: calc(var(--acid-grid) * 8); margin-bottom: calc(var(--acid-grid) * 4); }
  .showcase-label { font-family: var(--acid-f-mono); font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--acid-border); margin-bottom: calc(var(--acid-grid) * 4); font-weight: bold; }
  .showcase-content { display: flex; flex-wrap: wrap; gap: calc(var(--acid-grid) * 4); align-items: center; }
</style>
</head>
<body>
  <header class="page-head">
    <div class="eyebrow">PREVIEW · COMPONENTS</div>
    <h1>Input Fields</h1>
  </header>

  <div class="showcase">
    <div class="showcase-label">Form Entry States</div>
    <div class="showcase-content">
      <input class="acid-input" placeholder="Default state placeholder" />
      <input class="acid-input" value="Focused state value" />
      <input class="acid-input acid-input-error" value="Error input state" />
    </div>
  </div>

  <div class="showcase">
    <div class="showcase-label">Form Context Labels</div>
    <div class="showcase-content" style="flex-direction:column; align-items:flex-start; gap:calc(var(--acid-grid)*6);">
      <label style="display:flex; flex-direction:column; gap:calc(var(--acid-grid)*2);">
        <span class="acid-mono acid-s-sm" style="color:var(--acid-border); font-weight: bold;">PATIENT ID REFERENCE</span>
        <input class="acid-input" placeholder="PT-00000" style="min-width:280px;" />
      </label>
      <label style="display:flex; flex-direction:column; gap:calc(var(--acid-grid)*2);">
        <span class="acid-mono acid-s-sm" style="color:var(--acid-border); font-weight: bold;">GLUCOSE LEVEL (mg/dL)</span>
        <input class="acid-input acid-mono" placeholder="000.0" style="min-width:280px;" />
      </label>
    </div>
  </div>
</body>
</html>
