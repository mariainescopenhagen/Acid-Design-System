<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Acid — Button Components</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/fontsource/fonts/dela-gothic-one@latest/latin-400-normal.css" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/fontsource/fonts/space-grotesk@latest/latin-400-normal.css" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/fontsource/fonts/fira-code@latest/latin-400-normal.css" />
<style>
  body { padding: calc(var(--acid-grid) * 10) var(--acid-margin); background-color: var(--acid-bg); color: var(--acid-text); font-family: var(--acid-f-body); }
  .page-head { border-bottom: 2px solid var(--acid-text); padding-bottom: calc(var(--acid-grid) * 4); margin-bottom: calc(var(--acid-grid) * 8); }
  .page-head .eyebrow { font-family: var(--acid-f-mono); font-size: var(--acid-s-sm); color: var(--acid-brand-secondary); margin-bottom: calc(var(--acid-grid) * 2); text-transform: uppercase; letter-spacing: 0.1em; }
  .page-head h1 { font-family: var(--acid-f-heading); font-size: var(--acid-s-lg); font-weight: 600; letter-spacing: -0.02em; margin: 0; }
  .showcase { background: var(--acid-surface); border: 1px solid var(--acid-border); border-radius: var(--acid-radius); padding: calc(var(--acid-grid) * 8); margin-bottom: calc(var(--acid-grid) * 6); }
  .showcase-label { font-family: var(--acid-f-mono); font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--acid-border); margin-bottom: calc(var(--acid-grid) * 4); font-weight: bold; }
  .showcase-content { display: flex; flex-wrap: wrap; gap: calc(var(--acid-grid) * 4); align-items: center; }
</style>
</head>
<body>
  <header class="page-head">
    <div class="eyebrow">COMPONENT · BUTTONS</div>
    <h1>Buttons Specifications</h1>
  </header>

  <div class="showcase">
    <div class="showcase-label">Button Variants</div>
    <div class="showcase-content">
      <button class="acid-btn acid-btn-primary">Primary Action</button>
      <button class="acid-btn acid-btn-secondary">Secondary Action</button>
      <button class="acid-btn">Default Button</button>
      <button class="acid-btn acid-btn-ghost">Ghost Outlines</button>
    </div>
  </div>

  <div class="showcase">
    <div class="showcase-label">With Directional Icons</div>
    <div class="showcase-content">
      <button class="acid-btn acid-btn-primary">&rarr; Continue</button>
      <button class="acid-btn">+ Add Record</button>
      <button class="acid-btn acid-btn-ghost">&orarr; Calibrate</button>
    </div>
  </div>

  <div class="showcase">
    <div class="showcase-label">Active / Disabled States</div>
    <div class="showcase-content">
      <button class="acid-btn acid-btn-primary" disabled>Primary (Disabled)</button>
      <button class="acid-btn" disabled>Default (Disabled)</button>
    </div>
  </div>
</body>
</html>
